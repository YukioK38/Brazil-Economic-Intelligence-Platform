name: ETL Pipeline

on:
  schedule:
    # Runs every day at 06:00 UTC (03:00 Brasília time, without daylight saving)
    - cron: '0 6 * * *'
  workflow_dispatch: {}
    # Allows manual execution via the "Actions" tab on GitHub
  push:
    branches: [ main ]  # (OPTIONAL) Runs automatically on every push to the main branch

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database schema
        run: python init_db.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run ingestion pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main.py
